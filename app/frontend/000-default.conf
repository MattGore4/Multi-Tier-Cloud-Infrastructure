# Tells Apache to listen for incoming web traffic on Port 80 
<VirtualHost *:80>

    # Admin address to display if server encounters an error
    ServerAdmin webmaster@localhost
       
    # Directory where static frontend files are stored
    DocumentRoot /var/www/html

    # This tells Apache to send web requests starting with /api/search to 
    # the private app server on port 8000
    ProxyPass /api/search http://<PRIVATE_APP_SERVER_IP>:8000/api/search disablereuse=on
        
    # Prevents the user's browser from accidentally seeing the internal IP address
    ProxyPassReverse /api/search http://<PRIVATE_APP_SERVER_IP>:8000/api/search

    # These reverse proxy routes do the same thing as the ones above for documents
    ProxyPass /api/documents http://<PRIVATE_APP_SERVER_IP>:8000/api/documents disablereuse=on
    ProxyPassReverse /api/documents http://<PRIVATE_APP_SERVER_IP>:8000/api/documents

    # Records server errors and user traffic in log files
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>
